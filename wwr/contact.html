<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
      content="Conquer the river rapids! Join our expert-guided white water rafting adventures. Safe, thrilling, and unforgettable. Book your ultimate river trip today!">
    <meta name="author" content="Alvaro Garcia">
    <title>Contact us</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-raftingbw.png" alt="Company logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="info">
            <h1>Rapid Rush Rafting Company</h1>
            <p>Idaho 83445, EE. UU.</p>
            <p>(212) 555-1234</p>
            <p>rapid_rush@gmail.com</p>
        </div>
        <section class="map-form">
            <div>
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5744.791989725609!2d-111.71176709999997!3d43.95117255000001!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x5353fa0120bed3c3%3A0x9d388d255445b785!2sCondado%20de%20Fremont!5e0!3m2!1ses!2spe!4v1780323326764!5m2!1ses!2spe"
                  width="400" height="300" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="form">
                <form action="form">
                    <div class="form-item column2">
                        <label for="username">Name:</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-item column2">
                        <label for="email">Email:</label>
                        <input type="text" name="Email" id="email" required>
                    </div>
                    <div class="radio">
                        <span>Message Purpose</span>
                        <div class="radio-option">
                            <input type="radio" id="general" name="Purpose">
                            <label for="general">General Inquiry</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="reservation" name="Purpose">
                            <label for="reservation">General Inquiry</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="suggestion" name="Purpose">
                            <label for="suggestion">General Inquiry</label>
                        </div>
                    </div>
                    <div class="message">
                        <label for="message">Message</label>
                        <textarea name="message" id="message"></textarea>
                    </div>
                    <div>
                        <input type="checkbox" id="subscribe" name="subscribe">
                        <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                    </div>
                    <button type="submit">Get in Touch!</button>
                </form>
            </div>
        </section>

        <section class="employees">
            <h2>We Are Here to Serve You</h2>
            <figure>

                <img src="images/employee1.jpg" alt="Employee picture">

                <figcaption>Jake Thompson</figcaption>
            </figure>
            <figure>

                <img src="images/employee2.jpg" alt="Employee picture">

                <figcaption>Emily Carter</figcaption>
            </figure>
            <figure>

                <img src="images/employee3.jpg" alt="Employee picture">

                <figcaption>Ryan Brooks</figcaption>
            </figure>

        </section>
    </main>
    <footer>
        <p>&copy; 2026 &#10070; Alvaro Garcia &#10070; Rapid Rush Rafting </p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook_2111342.png" alt="Facebook logo">
            </a>
            <a href="https://instagram.com">
                <img src="images/social_15707749.png" alt="instagram logo">
            </a>
            <a href="https://www.linkedin.com">
                <img src="images/linkedin_725337.png" alt="linkedin logo">
            </a>
        </nav>
    </footer>

</body>

</html>
