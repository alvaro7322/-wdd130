<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>
<header>
    <h1>
        <h1>&#x2705; Basic HTML and CSS Quiz</h1>
    </h1>
</header>

<body>
    <main>
        <form action="">
            <div class="quiz-item">
                <label for="q1">1.- In CSS, what is the difference between using relative and
                    absolute positioning for an element?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item">
                <label for="q2">2.- In CSS, what property is used to change the text color of an
                    element?</label>
                <textarea id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item">
                <label for="q3">3.- Which of the following CSS properties is used to change the size
                    of the text?</label>
                <select id="q3" name="q3">
                    <option value="font-size">font-size</option>
                    <option value="text-align">text-align</option>
                    <option value="color">color</option>
                </select>
            </div>
            <div class="quiz-item">
                <label for="q4">4.- What is the bottom margin given this declaration?</label>
                <code>margin: 10px 5px 15px;</code>
                <input type="text" id="q4" name="q4">
            </div>
            <button type="submit">Submit the Quiz for Grading</button>
        </form>
    </main>

</body>

</html>
