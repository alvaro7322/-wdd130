<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>

    <main>
        <header>
            <h1>WDD 130 | HTML Form - User Poll</h1>
        </header>
        <form>
            <fieldset>
                <legend>Contact Information</legend>
                <div class="form-item column2">
                    <label for=" username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-item column2">
                    <label for=" email">Email address:</label>
                    <input type="text" name="Email" id="email" required>
                </div>
            </fieldset>
            <fieldset>
                <legend>Question</legend>
                <div class="form-item column1">
                    <label for="favorite browser">What is your favorite internet browser?</label>
                    <select name="favorite browser" id="favorite browser">
                        <option value="Opera">Opera</option>
                        <option value="Chrome">Chrome</option>
                        <option value="Edge">Edge</option>
                    </select>
                </div>
                <div class="form-item column1 pet">
                    <label for="pet">Do you have a household pet?</label>
                    <input type="checkbox" name="pet" id="pet">
                </div>
                <div class="form-item2">
                    <label for="feedback">List the places you have lived:</label>
                    <textarea name="feedback" id="feedback" rows="4"
                      placeholder="Tonga, China, Bolivia"></textarea>
                </div>
            </fieldset>
            <button type="submit">Submit pool</button>
        </form>
    </main>

</body>

<footer>
    <p>&copy; 2026 &#10070; Alvaro Garcia &#10070; Form </p>
</footer>

</html>
